<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Management System</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <h1>Community Event Management System</h1>

    <nav>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="create-event.html">Create Event</a>
        <a href="my-events.html">My Events</a>
        <a href="profile.html">Profile</a>

        <button onclick="toggleDarkMode()">
            🌙 Dark Mode
        </button>
    </nav>

</header>

<div class="search-container">

    <input
        type="text"
        id="searchBox"
        placeholder="🔍 Search Events..."
        onkeyup="searchEvents()">

</div>

<div class="container">

    <div id="dynamicEvents"></div>

</div>

<footer>

    <p>© 2026 Community Event Management System</p>

</footer>

<script src="js/app.js"></script>

<script>

const container = document.getElementById("dynamicEvents");

function loadEvents() {

    let events = JSON.parse(localStorage.getItem("events")) || [];

    container.innerHTML = "";

    if(events.length === 0){

        container.innerHTML = `
            <h2 style="text-align:center">
                No Events Available
            </h2>
        `;

        return;
    }

    events.forEach((event,index)=>{

        container.innerHTML += `

        <div class="card">

            <img
            src="${event.image || 'https://picsum.photos/400/200'}"
            alt="Event Image">

            <h2>${event.name}</h2>

            <p><b>Date:</b> ${event.date}</p>

            <p><b>Location:</b> ${event.location}</p>

            <p><b>Category:</b> ${event.category}</p>

            <p><b>Description:</b> ${event.description}</p>

            <button onclick="registerEvent('${event.name}')">
                Register
            </button>

            <button onclick="editEvent(${index})">
                Edit
            </button>

            <button onclick="deleteEvent(${index})">
                Delete
            </button>

        </div>

        `;

    });

}

function deleteEvent(index){

    let events = JSON.parse(localStorage.getItem("events")) || [];

    if(confirm("Delete this event?")){

        events.splice(index,1);

        localStorage.setItem("events",JSON.stringify(events));

        loadEvents();

    }

}

function editEvent(index){

    localStorage.setItem("editIndex",index);

    window.location.href="create-event.html";

}

function searchEvents(){

    let input = document
        .getElementById("searchBox")
        .value
        .toLowerCase();

    let cards = document.getElementsByClassName("card");

    for(let i=0;i<cards.length;i++){

        let text = cards[i].innerText.toLowerCase();

        cards[i].style.display =
            text.includes(input)
            ? "block"
            : "none";

    }

}

function toggleDarkMode(){

    document.body.classList.toggle("dark-mode");

    localStorage.setItem(
        "theme",
        document.body.classList.contains("dark-mode")
        ? "dark"
        : "light"
    );

}

if(localStorage.getItem("theme") === "dark"){

    document.body.classList.add("dark-mode");

}

loadEvents();

</script>

</body>

</html>
