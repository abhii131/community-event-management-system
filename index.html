<!DOCTYPE html>
<html>
<head>
    <title>Community Event Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Community Event Management System</h1>

    <nav>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="create-event.html">Create Event</a>
        <a href="my-events.html">My Events</a>
        <button onclick="toggleDarkMode()">
🌙 Dark Mode
</button>
        <a href="profile.html">Profile</a>
    </nav>
</header>

<div class="search-container">

    <input
    type="text"
    id="searchBox"
    placeholder="🔍 Search Events..."
    onkeyup="searchEvents()">

</div>

<div class="container">

    <!-- Default Event 1 -->
    <div class="card">

        <img
        src="https://picsum.photos/400/200?random=1"
        alt="Event Image">

        <h2>Web Development Workshop</h2>

        <p>Date: 25 June 2026</p>

        <p>Location: College Hall</p>

        <button onclick="registerEvent('Web Development Workshop')">
            Register
        </button>

    </div>

    <!-- Default Event 2 -->
    <div class="card">

        <img
        src="https://picsum.photos/400/200?random=2"
        alt="Event Image">

        <h2>AI Seminar</h2>

        <p>Date: 28 June 2026</p>

        <p>Location: Auditorium</p>

        <button onclick="registerEvent('AI Seminar')">
            Register
        </button>

    </div>

    <!-- Dynamic Events -->
    <div id="dynamicEvents"></div>

</div>

<footer>

    <p>
        © 2026 Community Event Management System
    </p>

</footer>

<script src="js/app.js"></script>

<script>

let events =
JSON.parse(localStorage.getItem("allEvents")) || [];

let container =
document.getElementById("dynamicEvents");

events.forEach(event => {

container.innerHTML += `

<div class="card">

<img
src="https://picsum.photos/400/200?random=${Math.floor(Math.random()*100)}"
alt="Event Image">

<h2>${event.name}</h2>

<p>Date: ${event.date}</p>

<p>Location: ${event.location}</p>


<p>Category: ${event.category}</p>

<p>Description: ${event.description}</p>



<button onclick="registerEvent('${event.name}')">
Register
</button>

<button onclick="editEvent('${event.name}')">
Edit
</button>

<button onclick="deleteEvent('${event.name}')">
Delete
</button>

</div>

`;

});

function searchEvents(){

let input =
document.getElementById("searchBox")
.value.toLowerCase();

let cards =
document.getElementsByClassName("card");

for(let i=0;i<cards.length;i++){

let text =
cards[i].innerText.toLowerCase();

if(text.includes(input)){
cards[i].style.display = "block";
}
else{
cards[i].style.display = "none";
}

}

}
function editEvent(eventName){

let newName =
prompt("Enter New Event Name");

if(!newName) return;

let events =
JSON.parse(localStorage.getItem("allEvents")) || [];

events.forEach(event => {

if(event.name === eventName){

event.name = newName;

}

});

localStorage.setItem(
"allEvents",
JSON.stringify(events)
);

alert("Event Updated!");

location.reload();

}
function deleteEvent(eventName){

let events =
JSON.parse(localStorage.getItem("allEvents")) || [];

events =
events.filter(event =>
event.name !== eventName
);

localStorage.setItem(
"allEvents",
JSON.stringify(events)
);

alert("Event Deleted!");

location.reload();

}


function toggleDarkMode(){

document.body.classList.toggle("dark-mode");

}



</script>

</body>
</html>
