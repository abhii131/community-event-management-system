<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Events</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>

<h1>My Registered Events</h1>

<nav>

<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="profile.html">Profile</a>
<a href="notifications.html">

Notifications

</a>

</nav>

</header>

<div class="container">

<div id="eventContainer"></div>

</div>

<script>

if(localStorage.getItem("loggedIn")!=="true"){

alert("Please login first!");

window.location.href="login.html";

}

let registeredEvents=
JSON.parse(localStorage.getItem("registeredEvents")) || [];

let events=
JSON.parse(localStorage.getItem("events")) || [];

let user=
JSON.parse(localStorage.getItem("user")) || {};

let container=
document.getElementById("eventContainer");

if(registeredEvents.length===0){

container.innerHTML=`

<div class="card">

<h2>No Registered Events</h2>

<p>You have not registered for any event.</p>

</div>

`;

}else{

registeredEvents.forEach((eventName,index)=>{

let event=
events.find(e=>e.name===eventName);

if(!event) return;

let status=

new Date(event.date)>=new Date()

? "Upcoming"

: "Completed";

container.innerHTML+=`

<div class="card">

<img
src="${event.image || 'https://picsum.photos/500/300'}"
alt="Event">

<h2>${event.name}</h2>

<span class="badge">

${event.category}

</span>

<p><b>Organizer:</b> ${event.organizer}</p>

<p><b>Date:</b> ${event.date}</p>

<p><b>Location:</b> ${event.location}</p>

<p><b>Status:</b> ${status}</p>

<p><b>Participants:</b> ${event.registered}/${event.capacity}</p>

<p>${event.description}</p>

<button
onclick="downloadCertificate('${event.name}')">

📄 Download Certificate

</button>

<button
onclick="giveFeedback('${event.name}')">

⭐ Give Feedback

</button>

<button
onclick="removeRegistration(${index})">

❌ Remove Registration

</button>

</div>

`;

});

}

function removeRegistration(index){

let events=
JSON.parse(localStorage.getItem("events")) || [];

let eventName=
registeredEvents[index];

let eventIndex=
events.findIndex(e=>e.name===eventName);

if(eventIndex!=-1){

if(events[eventIndex].registered>0){

events[eventIndex].registered--;

}

}

registeredEvents.splice(index,1);

localStorage.setItem(

"registeredEvents",

JSON.stringify(registeredEvents)

);

localStorage.setItem(

"events",

JSON.stringify(events)

);

let notifications =
JSON.parse(localStorage.getItem("notifications")) || [];

notifications.push({

message:"❌ Registration Cancelled : " + eventName,

time:new Date().toLocaleString()

});

localStorage.setItem(
"notifications",
JSON.stringify(notifications)
);

alert("Registration Removed Successfully!");


location.reload();

}

function giveFeedback(eventName){

localStorage.setItem(

"feedbackEvent",

eventName

);

window.location.href="feedback.html";

}
function downloadCertificate(eventName){

const { jsPDF } = window.jspdf;

const doc = new jsPDF("landscape");

doc.setDrawColor(0,51,153);
doc.setLineWidth(2);
doc.rect(10,10,277,190);

doc.setFont("helvetica","bold");
doc.setFontSize(26);
doc.setTextColor(0,51,153);

doc.text(
"COMMUNITY EVENT MANAGEMENT SYSTEM",
148,
30,
{align:"center"}
);

doc.setFontSize(22);
doc.setTextColor(0,0,0);

doc.text(
"CERTIFICATE OF PARTICIPATION",
148,
50,
{align:"center"}
);

doc.setFont("times","italic");
doc.setFontSize(16);

doc.text(
"This certificate is proudly presented to",
148,
72,
{align:"center"}
);

doc.setFont("times","bold");
doc.setFontSize(28);
doc.setTextColor(153,0,0);

doc.text(
user.name || "Participant",
148,
92,
{align:"center"}
);

doc.setFont("helvetica","normal");
doc.setFontSize(16);
doc.setTextColor(0,0,0);

doc.text(
"for successfully participating in",
148,
110,
{align:"center"}
);

doc.setFont("helvetica","bold");
doc.setFontSize(22);
doc.setTextColor(0,102,0);

doc.text(
eventName,
148,
126,
{align:"center"}
);

doc.setFontSize(14);

doc.text(
"Date: " + new Date().toLocaleDateString(),
30,
160
);

doc.line(30,172,90,172);
doc.text(
"Event Coordinator",
30,
180
);

doc.line(190,172,250,172);
doc.text(
"Project Administrator",
190,
180
);

doc.setFontSize(11);
doc.setTextColor(100);

doc.text(
"Community Event Management System © 2026",
148,
195,
{align:"center"}
);

doc.save(eventName + "_Certificate.pdf");

}

</script>

</body>

</html>
