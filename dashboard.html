<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>Dashboard</h1>

<nav>

<a href="index.html">Home</a>
<a href="create-event.html">Create Event</a>
<a href="my-events.html">My Events</a>
<a href="profile.html">Profile</a>
<a href="notifications.html">

Notifications

</a>

</nav>

</header>

<div class="container">

<div class="card">
<h2>📅 Total Events</h2>
<h1 id="totalEvents">0</h1>
</div>

<div class="card">
<h2>👥 Registrations</h2>
<h1 id="totalRegistrations">0</h1>
</div>

<div class="card">
<h2>🟢 Upcoming Events</h2>
<h1 id="upcomingEvents">0</h1>
</div>

<div class="card">
<h2>🔴 Completed Events</h2>
<h1 id="completedEvents">0</h1>
</div>

<div class="card">
<h2>🎉 Latest Event</h2>
<p id="latestEvent">None</p>
</div>

<div class="card">
<h2>✅ Latest Registration</h2>
<p id="latestRegistration">None</p>
</div>

<div class="card">
<h2>🏟 Total Capacity</h2>
<h1 id="totalCapacity">0</h1>
</div>

<div class="card">
<h2>💺 Available Seats</h2>
<h1 id="availableSeats">0</h1>
</div>

</div>

<script>

if(localStorage.getItem("loggedIn")!=="true"){

alert("Please login first!");

window.location.href="login.html";

}

let events =
JSON.parse(localStorage.getItem("events")) || [];

let registrations =
JSON.parse(localStorage.getItem("registeredEvents")) || [];

document.getElementById("totalEvents").innerText =
events.length;

document.getElementById("totalRegistrations").innerText =
registrations.length;

let upcoming = 0;
let completed = 0;

let totalCapacity = 0;
let availableSeats = 0;

let today = new Date();

events.forEach(event=>{

let eventDate = new Date(event.date);

if(eventDate >= today){

upcoming++;

}else{

completed++;

}

totalCapacity += Number(event.capacity);

availableSeats +=
Number(event.capacity) -
Number(event.registered);

});

document.getElementById("upcomingEvents").innerText =
upcoming;

document.getElementById("completedEvents").innerText =
completed;

document.getElementById("totalCapacity").innerText =
totalCapacity;

document.getElementById("availableSeats").innerText =
availableSeats;

if(events.length>0){

document.getElementById("latestEvent").innerText =
events[events.length-1].name;

}

if(registrations.length>0){

document.getElementById("latestRegistration").innerText =
registrations[registrations.length-1];

}

</script>

</body>

</html>
