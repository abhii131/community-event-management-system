<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Profile</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>User Profile</h1>

<nav>

<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="my-events.html">My Events</a>

</nav>

</header>

<div class="container">

<div class="card" style="text-align:center;">

<img
id="profileImage"
src="https://ui-avatars.com/api/?name=User&size=150"
alt="Profile"
width="150">

<br><br>

<input
type="file"
id="profilePic"
accept="image/*">

<br><br>

<h2>Edit Profile</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<br><br>

<input
type="email"
id="email"
placeholder="Email">

<br><br>

<input
type="tel"
id="contact"
placeholder="Contact Number">

<br><br>

<select id="role">

<option value="Participant">
Participant
</option>

<option value="Organizer">
Organizer
</option>

</select>

<br><br>

<textarea
id="bio"
placeholder="Write your bio"></textarea>

<br><br>

<p>

<strong>Total Registrations :</strong>

<span id="registrations">0</span>

</p>

<br>

<button onclick="saveProfile()">

Save Changes

</button>

<button onclick="logout()">

Logout

</button>

</div>

</div>

<script>

if(localStorage.getItem("loggedIn")!=="true"){

alert("Please login first!");

window.location.href="login.html";

}

let user=
JSON.parse(localStorage.getItem("user"))||{};

let registrations=
JSON.parse(localStorage.getItem("registeredEvents"))||[];

document.getElementById("registrations").innerText=
registrations.length;

document.getElementById("name").value=
user.name||"";

document.getElementById("email").value=
user.email||"";

document.getElementById("contact").value=
user.contact||"";

document.getElementById("role").value=
user.role||"Participant";

document.getElementById("bio").value=
user.bio||"";

let savedImage=
localStorage.getItem("profileImage");

if(savedImage){

document.getElementById("profileImage").src=
savedImage;

}else{

document.getElementById("profileImage").src=
"https://ui-avatars.com/api/?name="+
encodeURIComponent(user.name||"User")+
"&size=150";

}

document.getElementById("profilePic")
.addEventListener("change",function(){

let file=this.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(e){

document.getElementById("profileImage").src=
e.target.result;

localStorage.setItem(
"profileImage",
e.target.result
);

};

reader.readAsDataURL(file);

});

function saveProfile(){

user.name=
document.getElementById("name").value;

user.email=
document.getElementById("email").value;

user.contact=
document.getElementById("contact").value;

user.role=
document.getElementById("role").value;

user.bio=
document.getElementById("bio").value;

localStorage.setItem(
"user",
JSON.stringify(user)
);

alert("Profile Updated Successfully!");

}

function logout(){

localStorage.removeItem("loggedIn");

alert("Logged Out Successfully!");

window.location.href="login.html";

}

</script>

</body>

</html>
