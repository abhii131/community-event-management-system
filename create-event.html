<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Event</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>Create Event</h1>

<nav>

<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="calendar.html">Calendar</a>
<a href="notifications.html">Notifications</a>
<a href="my-events.html">My Events</a>

</nav>

</header>

<div class="container">

<div class="card">

<form id="eventForm">

<input
type="text"
id="eventName"
placeholder="Event Name"
required>

<br><br>

<input
type="date"
id="eventDate"
required>

<br><br>

<input
type="text"
id="eventLocation"
placeholder="Location"
required>

<br><br>

<select id="eventCategory" required>

<option value="">Select Category</option>
<option>Workshop</option>
<option>Seminar</option>
<option>Sports</option>
<option>Cultural</option>
<option>Technical</option>
<option>Hackathon</option>

</select>

<br><br>

<textarea
id="eventDescription"
placeholder="Event Description"></textarea>

<br><br>

<input
type="number"
id="eventCapacity"
placeholder="Maximum Participants"
min="1"
required>

<br><br>

<input
type="text"
id="organizer"
readonly>

<br><br>

<input
type="file"
id="eventImage"
accept="image/*">

<br><br>

<button type="submit">

Save Event

</button>

</form>

</div>

</div>

<script>

if(localStorage.getItem("loggedIn")!=="true"){

alert("Please login first.");

window.location.href="login.html";

}

let user=
JSON.parse(localStorage.getItem("user")) || {};

document.getElementById("organizer").value=
user.name || "";

document.getElementById("eventDate").min=
new Date().toISOString().split("T")[0];

let events=
JSON.parse(localStorage.getItem("events")) || [];

let editIndex=
localStorage.getItem("editIndex");

if(editIndex!==null && events[editIndex]){

let event=events[editIndex];

document.getElementById("eventName").value=event.name;
document.getElementById("eventDate").value=event.date;
document.getElementById("eventLocation").value=event.location;
document.getElementById("eventCategory").value=event.category;
document.getElementById("eventDescription").value=event.description;
document.getElementById("eventCapacity").value=event.capacity;
document.getElementById("organizer").value=event.organizer;

}else{

editIndex=null;
localStorage.removeItem("editIndex");

}

document.getElementById("eventForm").addEventListener("submit",function(e){

e.preventDefault();

let image=
document.getElementById("eventImage").files[0];

if(image){

let reader=new FileReader();

reader.onload=function(){

saveEvent(reader.result);

};

reader.readAsDataURL(image);

}else{

let oldImage="";

if(editIndex!==null){

oldImage=events[editIndex].image;

}

saveEvent(oldImage);

}

});

function saveEvent(image){

let event={

name:document.getElementById("eventName").value,

date:document.getElementById("eventDate").value,

location:document.getElementById("eventLocation").value,

category:document.getElementById("eventCategory").value,

description:document.getElementById("eventDescription").value,

capacity:Number(document.getElementById("eventCapacity").value),

registered:
editIndex!==null
? events[editIndex].registered
: 0,

organizer:
document.getElementById("organizer").value,

image:image

};

if(editIndex!==null){

events[editIndex]=event;

localStorage.removeItem("editIndex");

}else{

events.push(event);

}

localStorage.setItem(
"events",
JSON.stringify(events)
);

/* Save Notification */

let notifications=
JSON.parse(localStorage.getItem("notifications")) || [];

notifications.push({

message:"📅 New Event Created: " + event.name,

time:new Date().toLocaleString()

});

localStorage.setItem(
"notifications",
JSON.stringify(notifications)
);

alert("Event Saved Successfully!");

window.location.href="index.html";

}

</script>

</body>

</html>
