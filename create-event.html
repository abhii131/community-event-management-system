<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Create Event</h1>
    <a href="index.html">Home</a>
</header>

<div class="container">

    <div class="card">

        <form id="eventForm">

            <input
                type="text"
                id="eventName"
                placeholder="Event Name"
                required>

            <br><br>

            <input
                type="date"
                id="eventDate"
                required>

            <br><br>

            <input
                type="text"
                id="eventLocation"
                placeholder="Location"
                required>

            <br><br>

            <input
                type="text"
                id="eventCategory"
                placeholder="Category">

            <br><br>

            <textarea
                id="eventDescription"
                placeholder="Event Description"></textarea>

            <br><br>

            <input
                type="file"
                id="eventImage"
                accept="image/*">

            <br><br>

            <button type="submit">
                Save Event
            </button>

        </form>

    </div>

</div>

<script>

const form = document.getElementById("eventForm");

let editIndex = localStorage.getItem("editIndex");
let events = JSON.parse(localStorage.getItem("events")) || [];

/* Load event if editing */

if (editIndex !== null) {

    let event = events[editIndex];

    if (event) {

        document.getElementById("eventName").value = event.name;
        document.getElementById("eventDate").value = event.date;
        document.getElementById("eventLocation").value = event.location;
        document.getElementById("eventCategory").value = event.category;
        document.getElementById("eventDescription").value = event.description;

    }
}

form.addEventListener("submit", function (e) {

    e.preventDefault();

    let eventName = document.getElementById("eventName").value;
    let eventDate = document.getElementById("eventDate").value;
    let eventLocation = document.getElementById("eventLocation").value;
    let eventCategory = document.getElementById("eventCategory").value;
    let eventDescription = document.getElementById("eventDescription").value;

    let imageFile = document.getElementById("eventImage").files[0];

    if (imageFile) {

        const reader = new FileReader();

        reader.onload = function () {

            saveEvent(reader.result);

        };

        reader.readAsDataURL(imageFile);

    } else {

        let oldImage = "";

        if (editIndex !== null && events[editIndex]) {

            oldImage = events[editIndex].image;

        }

        saveEvent(oldImage);

    }

    function saveEvent(imageData) {

        let newEvent = {

            name: eventName,
            date: eventDate,
            location: eventLocation,
            category: eventCategory,
            description: eventDescription,
            image: imageData

        };

        if (editIndex !== null) {

            events[editIndex] = newEvent;

            localStorage.removeItem("editIndex");

        } else {

            events.push(newEvent);

        }

        localStorage.setItem("events", JSON.stringify(events));

        alert("Event Saved Successfully!");

        window.location.href = "index.html";

    }

});

</script>

</body>
</html>
