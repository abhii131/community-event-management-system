```html
<!DOCTYPE html>
<html>
<head>
    <title>Create Event</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
<h1>Create Event</h1>
<a href="index.html">Home</a>
</header>

<div class="container">

<div class="card">

<form id="eventForm">

<input type="text"
id="eventName"
placeholder="Event Name"
required>

<br><br>

<input type="date"
id="eventDate"
required>

<br><br>

<input type="text"
id="eventLocation"
placeholder="Location"
required>

<br><br>

<input type="text"
id="eventCategory"
placeholder="Category">

<br><br>

<textarea
id="eventDescription"
placeholder="Event Description">
</textarea>

<br><br>

<input
type="file"
id="eventImage">

<br><br>

<button type="submit">
Create Event
</button>

</form>

</div>

</div>

<script>

document.getElementById("eventForm")
.addEventListener("submit", function(e){

e.preventDefault();

let eventName =
document.getElementById("eventName").value;

let eventDate =
document.getElementById("eventDate").value;

let eventLocation =
document.getElementById("eventLocation").value;

let eventCategory =
document.getElementById("eventCategory").value;

let eventDescription =
document.getElementById("eventDescription").value;

let eventImage =
document.getElementById("eventImage").files[0];

let events =
JSON.parse(localStorage.getItem("allEvents"))
|| [];

if(eventImage){

let reader = new FileReader();

reader.onload = function(){

events.push({
name:eventName,
date:eventDate,
location:eventLocation,
category:eventCategory,
description:eventDescription,
image:reader.result
});

localStorage.setItem(
"allEvents",
JSON.stringify(events)
);

alert("Event Created!");

window.location.href =
"index.html";

};

reader.readAsDataURL(eventImage);

}
else{

events.push({
name:eventName,
date:eventDate,
location:eventLocation,
category:eventCategory,
description:eventDescription,
image:""
});

localStorage.setItem(
"allEvents",
JSON.stringify(events)
);

alert("Event Created!");

window.location.href =
"index.html";

}

});

</script>

</body>
</html>
